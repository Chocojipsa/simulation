<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>콘서트 좌석 예약 시뮬레이션</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>콘서트 좌석 예약 시뮬레이션</h1>
        <p id="simulationStatus">시뮬레이션 대기 중</p>
      </div>
      <form id="startForm" class="controlbar">
        <label for="userCount">가상 사용자</label>
        <input id="userCount" name="userCount" type="number" min="1" max="1000" value="150">
        <button id="startButton" type="submit">시뮬레이션 시작</button>
      </form>
    </header>

    <section class="metrics" aria-label="시뮬레이션 지표">
      <div class="metric">
        <span>대기열 크기</span>
        <strong id="queueSize">0</strong>
      </div>
      <div class="metric">
        <span>입장 완료</span>
        <strong id="admittedCount">0</strong>
      </div>
      <div class="metric">
        <span>임시 선점</span>
        <strong id="heldCount">0</strong>
      </div>
      <div class="metric">
        <span>결제 진행 중</span>
        <strong id="paymentCount">0</strong>
      </div>
      <div class="metric">
        <span>예약 성공</span>
        <strong id="reservedCount">0</strong>
      </div>
      <div class="metric">
        <span>결제 실패</span>
        <strong id="failedCount">0</strong>
      </div>
    </section>

    <section class="workspace">
      <section class="seat-section" aria-label="좌석표">
        <div class="stage">무대</div>
        <div id="seatMap" class="seat-map"></div>
        <div class="legend" aria-label="좌석 상태 범례">
          <span><i class="dot available"></i>선택 가능</span>
          <span><i class="dot held"></i>임시 선점</span>
          <span><i class="dot payment"></i>결제 진행 중</span>
          <span><i class="dot reserved"></i>예약 완료</span>
        </div>
      </section>

      <aside class="sidepanel">
        <section class="panel">
          <div class="panel-title">
            <h2>대기열</h2>
            <span id="waitingQueueCount">0명</span>
          </div>
          <div id="waitingQueue" class="waiting-queue"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>가상 사용자</h2>
            <span id="userCountLabel">0명</span>
          </div>
          <div id="userList" class="user-list"></div>
        </section>

        <section class="panel timeline-panel">
          <div class="panel-title">
            <h2>진행 상황</h2>
            <span id="selectedUserLabel">선택 없음</span>
          </div>
          <ol id="timeline" class="timeline"></ol>
        </section>
      </aside>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
