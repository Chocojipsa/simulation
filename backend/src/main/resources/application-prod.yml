app:
  instance-id: ${APP_INSTANCE_ID}

payment:
  failure-rate-percent: ${PAYMENT_FAILURE_RATE_PERCENT:0}
  simulation-delay-min-ms: ${PAYMENT_SIMULATION_DELAY_MIN_MS:300}
  simulation-delay-max-ms: ${PAYMENT_SIMULATION_DELAY_MAX_MS:900}


live-event:
  id: ${LIVE_EVENT_ID:00000000-0000-0000-0000-000000000001}
  title: ${LIVE_EVENT_TITLE:부산 콘서트 티켓팅}
  seat-count: ${LIVE_EVENT_SEAT_COUNT:120}
  countdown-seconds: ${LIVE_EVENT_COUNTDOWN_SECONDS:60}
  open-window-seconds: ${LIVE_EVENT_OPEN_WINDOW_SECONDS:300}
  ai-user-count: ${LIVE_EVENT_AI_USER_COUNT:150}
  ai-batch-enabled: ${LIVE_EVENT_AI_BATCH_ENABLED:true}
  ai-start-delay-millis: ${LIVE_EVENT_AI_START_DELAY_MILLIS:0}
  ai:
    participant-count: ${LIVE_EVENT_AI_PARTICIPANT_COUNT:150}
    concurrency: ${LIVE_EVENT_AI_CONCURRENCY:50}

waiting-queue:
  admission-batch-size: ${WAITING_QUEUE_ADMISSION_BATCH_SIZE:5}
  max-active-admissions: ${WAITING_QUEUE_MAX_ACTIVE_ADMISSIONS:30}
  selection-ttl-seconds: ${WAITING_QUEUE_SELECTION_TTL_SECONDS:60}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}


traffic-generator:
  control-base-url: ${TRAFFIC_GENERATOR_CONTROL_BASE_URL:http://localhost:8080}
  target-base-url: ${TRAFFIC_GENERATOR_TARGET_BASE_URL:http://api:8080}
  default-concurrency: ${TRAFFIC_GENERATOR_DEFAULT_CONCURRENCY:20}
