server:
  port: 8080

app:
  instance-id: ${APP_INSTANCE_ID:local-api}

traffic-generator:
  control-base-url: ${TRAFFIC_GENERATOR_CONTROL_BASE_URL:http://localhost:8080}
  target-base-url: ${TRAFFIC_GENERATOR_TARGET_BASE_URL:http://localhost:8080}
  default-concurrency: ${TRAFFIC_GENERATOR_DEFAULT_CONCURRENCY:20}

live-event:
  id: ${LIVE_EVENT_ID:00000000-0000-0000-0000-000000000001}
  title: ${LIVE_EVENT_TITLE:부산 콘서트 티켓팅}
  seat-count: ${LIVE_EVENT_SEAT_COUNT:120}
  countdown-seconds: ${LIVE_EVENT_COUNTDOWN_SECONDS:60}
  open-window-seconds: ${LIVE_EVENT_OPEN_WINDOW_SECONDS:300}
  ai-user-count: ${LIVE_EVENT_AI_USER_COUNT:150}
  ai-batch-enabled: ${LIVE_EVENT_AI_BATCH_ENABLED:true}
  ai-start-delay-millis: ${LIVE_EVENT_AI_START_DELAY_MILLIS:0}
  ai:
    participant-count: ${LIVE_EVENT_AI_PARTICIPANT_COUNT:150}
    concurrency: ${LIVE_EVENT_AI_CONCURRENCY:50}

payment:
  failure-rate-percent: ${PAYMENT_FAILURE_RATE_PERCENT:0}
  simulation-delay-min-ms: ${PAYMENT_SIMULATION_DELAY_MIN_MS:300}
  simulation-delay-max-ms: ${PAYMENT_SIMULATION_DELAY_MAX_MS:900}
  kafka:
    partitions: ${PAYMENT_KAFKA_PARTITIONS:5}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/seat_reservation
    username: app
    password: app
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9094
    consumer:
      group-id: seat-reservation-local
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.timedeal.seatreservation.payment
        spring.json.value.default.type: com.timedeal.seatreservation.payment.PaymentRequestedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
