name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'

env:
  DOCKER_IMAGE: chocojipsa/timedeal-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build JAR
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test --no-daemon

      - name: Prepare Docker build
        run: |
          find backend/build/libs/ -name "*.jar" ! -name "*-plain.jar" -exec cp {} backend/app.jar \;

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -f backend/Dockerfile.production \
            -t ${{ env.DOCKER_IMAGE }}:${{ github.run_number }} \
            -t ${{ env.DOCKER_IMAGE }}:latest \
            ./backend
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.run_number }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/simulation/infra/prod
            git fetch --all
            git reset --hard origin/main
            BACKEND_VERSION=${{ github.run_number }} docker compose -f single-server.compose.yml pull api
            BACKEND_VERSION=${{ github.run_number }} docker compose -f single-server.compose.yml up -d
            BACKEND_VERSION=${{ github.run_number }} docker compose -f single-server.compose.yml exec -T nginx nginx -s reload || BACKEND_VERSION=${{ github.run_number }} docker compose -f single-server.compose.yml restart nginx
            
            echo "Checking deployment health..."
            for i in {1..30}; do
              if curl -s -o /dev/null -w "%{http_code}" http://localhost/health | grep -q "200"; then
                echo "Deployment is healthy!"
                exit 0
              fi
              echo "Waiting for backend to boot..."
              sleep 5
            done
            echo "Health check failed!"
            exit 1
