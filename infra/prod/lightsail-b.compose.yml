services:
  api-b:
    build:
      context: ../../backend
    env_file:
      - .env
    environment:
      APP_INSTANCE_ID: api-b
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build:
      context: ../../backend
    env_file:
      - .env
    environment:
      APP_INSTANCE_ID: worker
      SPRING_PROFILES_ACTIVE: prod,worker
    restart: unless-stopped

  traffic-generator:
    build:
      context: ../../backend
    env_file:
      - .env
    environment:
      APP_INSTANCE_ID: traffic-generator
      SPRING_PROFILES_ACTIVE: prod,generator
    ports:
      - "8081:8080"
    restart: unless-stopped
